AWSTemplateFormatVersion: "2010-09-09"
Description: ComboWeather monthly budget alarms ($10 / $30 / $100). Deploys to us-east-1 — AWS Budgets is a global service that CloudFormation only supports there. Currency is USD because Budgets uses the account's billing currency and EUR billing isn't enabled.

Parameters:
  Stage:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
  BudgetEmail:
    Type: String
    Description: Address that receives the spend alerts.

Resources:

  Budget10:
    Type: AWS::Budgets::Budget
    Properties:
      Budget:
        BudgetName: !Sub "comboweather-${Stage}-10usd"
        BudgetType: COST
        TimeUnit: MONTHLY
        BudgetLimit:
          Amount: 10
          Unit: USD
      NotificationsWithSubscribers:
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 100
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref BudgetEmail

  Budget30:
    Type: AWS::Budgets::Budget
    Properties:
      Budget:
        BudgetName: !Sub "comboweather-${Stage}-30usd"
        BudgetType: COST
        TimeUnit: MONTHLY
        BudgetLimit:
          Amount: 30
          Unit: USD
      NotificationsWithSubscribers:
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 100
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref BudgetEmail

  Budget100:
    Type: AWS::Budgets::Budget
    Properties:
      Budget:
        BudgetName: !Sub "comboweather-${Stage}-100usd"
        BudgetType: COST
        TimeUnit: MONTHLY
        BudgetLimit:
          Amount: 100
          Unit: USD
      NotificationsWithSubscribers:
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 100
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref BudgetEmail
        - Notification:
            NotificationType: FORECASTED
            ComparisonOperator: GREATER_THAN
            Threshold: 100
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref BudgetEmail
