AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: ComboWeather API — v0.4 (forecast + Nominatim search proxy).

Parameters:
  Stage:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
  SentryDsn:
    Type: String
    Default: ""
    NoEcho: true
    Description: Optional Sentry DSN; leave blank to disable.

Globals:
  Function:
    Runtime: nodejs24.x
    Architectures: [arm64]
    MemorySize: 512
    Timeout: 10
    Tracing: Active
    Environment:
      Variables:
        STAGE: !Ref Stage
        SENTRY_DSN: !Ref SentryDsn
        FORECASTS_TABLE: !Ref ForecastsTable
        SEARCHES_TABLE: !Ref SearchesTable
        NODE_OPTIONS: "--enable-source-maps"

Resources:

  ForecastsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "comboweather-forecasts-${Stage}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false

  SearchesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "comboweather-searches-${Stage}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false

  ForecastApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Stage
      CorsConfiguration:
        AllowOrigins: ["*"]
        AllowMethods: ["GET", "OPTIONS"]
        AllowHeaders: ["Content-Type", "X-Client-Id", "X-Client-Platform", "X-App-Version"]
        MaxAge: 300
      DefaultRouteSettings:
        ThrottlingBurstLimit: 100
        ThrottlingRateLimit: 50

  ForecastFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "comboweather-forecast-${Stage}"
      Handler: forecast.handler
      # Prebuilt by `pnpm --filter @combo/api build:lambda`. Self-contained
      # bundle (no workspace refs, no deps to install) so SAM packages it as-is.
      CodeUri: ../apps/api/.lambda-build/
      ReservedConcurrentExecutions: 50
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ForecastsTable
      Events:
        Forecast:
          Type: HttpApi
          Properties:
            ApiId: !Ref ForecastApi
            Method: GET
            Path: /forecast

  ForecastLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${ForecastFunction}"
      RetentionInDays: 14

  SearchFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "comboweather-search-${Stage}"
      Handler: search.handler
      CodeUri: ../apps/api/.lambda-build/
      # Smaller cap than forecast — Nominatim is rate-limited upstream so we
      # have no reason to fan out wide here.
      ReservedConcurrentExecutions: 10
      Timeout: 6
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SearchesTable
      Events:
        Search:
          Type: HttpApi
          Properties:
            ApiId: !Ref ForecastApi
            Method: GET
            Path: /search

  SearchLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${SearchFunction}"
      RetentionInDays: 14

# NOTE: AWS Budgets is a global service that CloudFormation only supports in
# us-east-1. The €10/€30/€100 budget alarms live in a separate stack —
# infra/budgets.yaml — deployed to us-east-1. See infra/README.md.

Outputs:
  ApiBaseUrl:
    Description: Base URL of the HTTP API
    Value: !Sub "https://${ForecastApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}"
  ForecastsTableName:
    Description: DynamoDB table for cached forecasts
    Value: !Ref ForecastsTable
  SearchesTableName:
    Description: DynamoDB table for cached geocoder responses
    Value: !Ref SearchesTable
