name: Drift check

# Hits every upstream provider through our production parsers once a day.
# If a provider quietly changes its response shape, our parser will throw
# and this workflow opens a tracking issue so we notice within 24 h.
# See apps/api/tests/drift/live-providers.test.ts for what we assert.

on:
  schedule:
    # 06:00 UTC — providers' overnight model runs have settled by this hour.
    - cron: "0 6 * * *"
  workflow_dispatch:

# `issues: write` is what lets the github-script step open the drift issue.
permissions:
  contents: read
  issues: write

jobs:
  drift:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # Pull the repo so we can run the workspace tests.
      - name: Check out the repository
        uses: actions/checkout@v4

      # Make the `pnpm` command available.
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      # Install Node.js; cache pnpm's store between runs.
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # Pull every workspace's dependencies, lockfile pinned.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Run only the drift-suite Vitest files against the real provider APIs.
      # RUN_LIVE_DRIFT=1 is what un-skips them — normal CI never runs them.
      # We capture both the exit code and the test output so the next step
      # can decide whether to open an issue and what to put in it.
      - name: Run live provider drift tests
        id: drift
        env:
          RUN_LIVE_DRIFT: "1"
        run: |
          set +e
          pnpm --filter @combo/api exec vitest run tests/drift --no-coverage 2>&1 | tee drift-output.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      # If any drift test failed, open a GitHub Issue summarizing what broke.
      # Dedup: if an open issue already exists with today's title, skip — we
      # don't want the same drift triggering daily-duplicate issues.
      - name: Open issue on drift detection
        if: steps.drift.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const out = fs.readFileSync('drift-output.txt', 'utf8');
            const today = new Date().toISOString().slice(0, 10);
            const title = `Provider drift detected — ${today}`;
            // Avoid duplicates: search for an open issue from the last 24h with the same date stamp.
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'drift',
            });
            if (existing.some(i => i.title === title)) {
              core.info(`Issue "${title}" already open — skipping create.`);
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              labels: ['drift'],
              body: [
                'Daily drift workflow detected a parser failure or shape change against a live provider response.',
                '',
                'Run: ' + `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                '```',
                out.slice(-6000),
                '```',
              ].join('\n'),
            });

      # The previous step uses `set +e` so test failures don't stop the job
      # before the issue gets opened. Re-fail the run here so the workflow
      # status badge turns red and we see it in the Actions list.
      - name: Re-fail the job so the run is red
        if: steps.drift.outputs.exit_code != '0'
        run: exit 1
