name: Drift check

# Hit every upstream provider through our production parsers once a day.
# If a provider changes its response shape, the parser will throw and this
# workflow opens a tracking issue. See apps/api/tests/drift/live-providers.test.ts
# for what we actually assert.

on:
  schedule:
    # 06:00 UTC — providers' overnight model runs have settled by this hour.
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  drift:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run live provider drift tests
        id: drift
        env:
          RUN_LIVE_DRIFT: "1"
        run: |
          set +e
          pnpm --filter @combo/api exec vitest run tests/drift --no-coverage 2>&1 | tee drift-output.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Open issue on drift detection
        if: steps.drift.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const out = fs.readFileSync('drift-output.txt', 'utf8');
            const today = new Date().toISOString().slice(0, 10);
            const title = `Provider drift detected — ${today}`;
            // Avoid duplicates: search for an open issue from the last 24h with the same date stamp.
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'drift',
            });
            if (existing.some(i => i.title === title)) {
              core.info(`Issue "${title}" already open — skipping create.`);
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              labels: ['drift'],
              body: [
                'Daily drift workflow detected a parser failure or shape change against a live provider response.',
                '',
                'Run: ' + `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                '```',
                out.slice(-6000),
                '```',
              ].join('\n'),
            });

      - name: Re-fail the job so the run is red
        if: steps.drift.outputs.exit_code != '0'
        run: exit 1
